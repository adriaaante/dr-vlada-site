name: Fetch doctor photos from Google Drive

# Зачем: облачная песочница, в которой работает Claude Code, не пропускает
# запросы на drive.google.com (host_not_allowed). GitHub Actions-раннер
# имеет полный интернет — поэтому скачиваем оттуда и коммитим в репо.
#
# Запускается:
#   - автоматически при первом пуше этого файла
#   - вручную через Actions → "Fetch doctor photos from Google Drive" → Run workflow

on:
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/fetch-drive-photos.yml'
      - 'scripts/download-drive-photos.py'

permissions:
  contents: write

concurrency:
  group: fetch-drive-photos
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download photos from Google Drive
        run: python3 scripts/download-drive-photos.py

      - name: List downloaded files
        run: ls -la assets/img/doctor/

      - name: Switch HTML refs from SVG placeholders to real photos
        run: python3 scripts/use-photos.py

      - name: Commit & push if anything changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/img/doctor index.html about.html
          if git diff --staged --quiet; then
            echo "Ничего нового — пропускаю коммит."
          else
            git commit -m "Add real doctor photos (auto-fetched from Drive)"
            git push
          fi
