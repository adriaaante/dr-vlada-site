<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="До: Скульптурирование скул филлером">
  <defs>
    <linearGradient id="g_cheekbones-sculpting_before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef3f5"/>
      <stop offset="1" stop-color="#d6e8ec"/>
    </linearGradient>
    <pattern id="p_cheekbones-sculpting_before" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1" fill="#1e6478" opacity=".35"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#g_cheekbones-sculpting_before)"/>
  <rect width="1200" height="900" fill="url(#p_cheekbones-sculpting_before)"/>

  <!-- Декоративный медицинский символ (стилизованная капля / лицо) -->
  <g transform="translate(600 380)" opacity=".55">
    <circle cx="0" cy="0" r="170" fill="none" stroke="#1e6478" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#1e6478" stroke-width="1"/>
    <circle cx="0" cy="0" r="70" fill="#1e6478" opacity=".25"/>
    <path d="M-50 -40 Q0 -120 50 -40 Q0 30 -50 -40 Z" fill="#1e6478" opacity=".7"/>
  </g>

  <!-- Тег категории -->
  <g transform="translate(60 60)">
    <rect width="180" height="42" rx="6" fill="#1e6478" opacity=".9"/>
    <text x="90" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="13" font-weight="700" letter-spacing="2" fill="#0e3d4d">СКУЛЫ</text>
  </g>

  <!-- Метка До/После -->
  <g transform="translate(1010 60)">
    <rect width="130" height="42" rx="6" fill="#0e3d4d"/>
    <text x="65" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="14" font-weight="700" letter-spacing="2" fill="#ffffff">ДО</text>
  </g>

  <!-- Заголовок -->
  <g transform="translate(600 700)">
    <text text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif"
          font-size="38" font-weight="500" fill="#0e3d4d">Скульптурирование скул филлером</text>
    <text y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="14" font-weight="500" letter-spacing="3" fill="#1e6478" opacity=".7">
      ПЛЕЙСХОЛДЕР · ЗАМЕНИТЕ BEFORE.JPG В ПАПКЕ КЕЙСА
    </text>
  </g>
</svg>
