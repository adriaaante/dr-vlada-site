<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1200" role="img" aria-label="Фото врача (плейсхолдер)">
  <defs>
    <linearGradient id="bg_hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d9b8"/>
      <stop offset="0.6" stop-color="#d6e8ec"/>
      <stop offset="1" stop-color="#1e6478"/>
    </linearGradient>
    <radialGradient id="glow_hero" cx=".5" cy=".35" r=".6">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="960" height="1200" fill="url(#bg_hero)"/>
  <rect width="960" height="1200" fill="url(#glow_hero)"/>

  <!-- Силуэт врача -->
  <g transform="translate(480.0 504.0)" opacity=".55">
    <circle cx="0" cy="0" r="172.79999999999998" fill="#0e3d4d" opacity=".7"/>
    <path d="M -307.2 528.0
             Q 0 172.79999999999998 307.2 528.0
             L 307.2 660.0
             L -307.2 660.0 Z"
          fill="#0e3d4d" opacity=".7"/>
  </g>

  <!-- Подпись -->
  <g transform="translate(480.0 1090)">
    <text text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif"
          font-size="57" font-weight="500" fill="#0e3d4d">Влада Боброва</text>
    <text y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="24" font-weight="600" letter-spacing="4" fill="#c5a572">ВРАЧ-КОСМЕТОЛОГ</text>
    <text y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="17" letter-spacing="2" fill="#1e6478" opacity=".75">
      ПЛЕЙСХОЛДЕР · ЗАМЕНИТЕ HERO.JPG/.PNG
    </text>
  </g>
</svg>
