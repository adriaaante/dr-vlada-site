<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Фото врача (плейсхолдер)">
  <defs>
    <linearGradient id="bg_about" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d9b8"/>
      <stop offset="0.6" stop-color="#d6e8ec"/>
      <stop offset="1" stop-color="#1e6478"/>
    </linearGradient>
    <radialGradient id="glow_about" cx=".5" cy=".35" r=".6">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg_about)"/>
  <rect width="800" height="1000" fill="url(#glow_about)"/>

  <!-- Силуэт врача -->
  <g transform="translate(400.0 420.0)" opacity=".55">
    <circle cx="0" cy="0" r="144.0" fill="#0e3d4d" opacity=".7"/>
    <path d="M -256.0 440.00000000000006
             Q 0 144.0 256.0 440.00000000000006
             L 256.0 550.0
             L -256.0 550.0 Z"
          fill="#0e3d4d" opacity=".7"/>
  </g>

  <!-- Подпись (только имя, без слова «плейсхолдер») -->
  <g transform="translate(400.0 920)">
    <text text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif"
          font-size="44" font-weight="500" fill="#0e3d4d">Влада Боброва</text>
    <text y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="17" font-weight="600" letter-spacing="4" fill="#c5a572">ВРАЧ-КОСМЕТОЛОГ</text>
  </g>
</svg>
